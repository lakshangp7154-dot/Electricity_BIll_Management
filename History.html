<!DOCTYPE html>
<html lang="en">
<head>

<title>Electricity Bill Calculation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#d8d6a7;
    position:relative;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(2px);
}

.main-wrapper{
    position:relative;
    z-index:10;
    width:100%;
    min-height:100vh;
}

.top-nav{
    width:750px;
    max-width:100%;
    /* margin:25px auto; */
    margin-left: 865px;
    margin-bottom: 38px;
    margin-top: 25px;
    background: rgb(255 255 255 / 20%);
    border-radius: 15px;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.search-box{
    width:220px;
}

.search-box input{
    width:100%;
    border:none;
    border-radius:30px;
    padding:8px 15px;
    outline:none;
}
.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color: #ffffff;
    font-weight: 600;
}

.search-box{
    width:180px;
}

.search-box input{
    border:none;
    background:#f3f3f3;
    border-radius:30px;
    padding:8px 15px;
    width:100%;
    outline:none;
}

.content-area{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.table thead th {
    color: rgb(96, 89, 89);
    background: rgb(204, 234, 216);
}
.table tbody td {
    color: rgb(96, 89, 89);
    background: rgb(239, 242, 239);
}
.login-card{
    width:100%;
    /* max-width:500px; */
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:30px;
    border:1px solid rgba(255,255,255,.2);
    padding:40px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.logo-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:35px;
}

.login-card h3{
    text-align:center;
    margin:20px 0 30px;
    font-weight:700;
}

.login-card label{
    margin-bottom:8px;
    font-weight:500;
}

.form-control{
    height:50px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,.25);
    color:white;
}

.form-control::placeholder{
    color:rgba(255,255,255,.7);
}

.form-control:focus{
    background:rgba(255,255,255,.3);
    color:white;
    box-shadow:none;
}

.btn-login{
    width:100%;
    height:50px;
    border:none;
    border-radius:30px;
    background:#2f80ed;
    color:white;
    font-weight:600;
    margin-top:20px;
    transition:.3s;
}

.btn-login:hover{
    background:#1565d8;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

<body>

<div class="main-wrapper">

            <a href="#">Home</a>
            <a href="#">About us</a>

        </div>

        <div class="search-box">

        </div>

    </div>

    <div class="container content-area">

        <div class="login-card">

            
    <h4 class="text-center">Bill Records</h4>

    <div class="table-responsive mt-4">

                    <th>Customer Name</th>
                    <th>Previous Reading</th>
                    <th>Current Reading</th>
                    <th>Units</th>

                    <td>2700</td>

            </tbody>
        </table>
    </div>
    <button class="btn-Next Page" onclick="window.location.href='Last Page.html'">
                            Next Page

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
