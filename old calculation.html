<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Bill | Calculation</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:url('https://jhatpatportal.uppcl.org/jhatpat/assets/Homepage%20images/1.jpg') center center/cover no-repeat;
    position:relative;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(2px);
}

.main-wrapper{
    position:relative;
    z-index:10;
    min-height:100vh;
}

/* Navigation */

.top-nav{
    width:750px;
    max-width:100%;
    margin-left:auto;
    margin-right:30px;
    margin-top:25px;
    background:rgba(255,255,255,.20);
    border-radius:15px;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

.search-box{
    width:180px;
}

.search-box input{
    width:100%;
    border:none;
    border-radius:30px;
    padding:8px 15px;
    outline:none;
}

/* Content */

.content-area{
    min-height:85vh;
    display:flex;
    align-items:center;
}

.title-card{
    background:white;
    border-radius:40px;
    padding:60px;
    max-width:550px;
    box-shadow:0 20px 40px rgba(0,0,0,.20);
}

.title-card h1{
    font-size:40px;
    font-weight:300;
}

.title-card h2{
    font-size:60px;
    font-weight:300;
}

.title-card h3{
    font-size:70px;
    font-weight:700;
    color:#2f80ed;
}

/* Calculation Card */

.calc-card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.20);
    border-radius:35px;
    padding:40px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.30);
}

.calc-card h3{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
}

.calc-card label{
    margin-bottom:8px;
    font-weight:500;
}

.calc-card .form-control{
    height:55px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.25);
    color:white;
    padding-left:20px;
}

.calc-card .form-control::placeholder{
    color:rgba(255,255,255,.7);
}

.calc-card .form-control:focus{
    background:rgba(255,255,255,.30);
    color:white;
    box-shadow:none;
}

.logo-icon{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.20);
    font-size:35px;
}

.btn-custom{
    width:100%;
    height:55px;
    border:none;
    border-radius:50px;
    background:#2f80ed;
    color:white;
    font-weight:600;
    margin-top:10px;
    transition:.3s;
}

.btn-custom:hover{
    background:#1565d8;
}

</style>

</head>
<body>

<div class="main-wrapper">

    <!-- Navigation -->

    <div class="top-nav">

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">About Us</a>
            <a href="#">Contact Us</a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search">
        </div>

    </div>

    <!-- Content -->

    <div class="container content-area">

        <div class="row align-items-center w-100">

            <!-- Left -->

            <div class="col-lg-7 mb-4">

                <div class="title-card">

                    <h1>ELECTRICITY BILL</h1>

                    <h2>Calculation</h2>

                    <h3>System</h3>

                </div>

            </div>

            <!-- Right -->

            <div class="col-lg-5">

                <div class="calc-card">

                    <div class="logo-icon">
                        <i class="fa-solid fa-bolt"></i>
                    </div>

                    <h3>BILL CALCULATION</h3>

                    <div class="mb-3">
                        <label>Customer Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter Customer Name">
                    </div>

                    <div class="mb-3">
                        <label>Price Per Unit (Rs.)</label>
                        <input type="number" class="form-control" id="ppu" placeholder="Enter Price Per Unit">
                    </div>

                    <div class="mb-3">
                        <label>Number of Units</label>
                        <input type="number" class="form-control" id="units" placeholder="Enter Number of Units">
                    </div>

                    <div class="mb-4">
                        <label>Total Bill</label>
                        <input type="text" class="form-control" id="total" placeholder="Total Bill" readonly>
                    </div>

                    <button class="btn-custom" onclick="calculateBill()">
                        CALCULATE
                    </button>

                    <button class="btn-custom mt-3"
                        onclick="window.location.href='bill calculation.html'">
                        NEXT
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function calculateBill(){

    let ppu = parseFloat(document.getElementById("ppu").value);
    let units = parseFloat(document.getElementById("units").value);

    if(isNaN(ppu) || isNaN(units))
    {
        alert("Please enter valid values.");
        return;
    }

    let total = ppu * units;

    document.getElementById("total").value = "Rs. " + total.toFixed(2);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
