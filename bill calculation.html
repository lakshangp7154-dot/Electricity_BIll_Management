<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electricity Bill Calculation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#d8d6a7;
    position:relative;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(2px);
}

.main-wrapper{
    position:relative;
    z-index:10;
    width:100%;
    min-height:100vh;
}

.top-nav{
    width:750px;
    max-width:100%;
    /* margin:25px auto; */
    margin-left: 865px;
    margin-bottom: 38px;
    margin-top: 25px;
    background: rgb(255 255 255 / 20%);
    border-radius: 15px;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.search-box{
    width:220px;
}

.search-box input{
    width:100%;
    border:none;
    border-radius:30px;
    padding:8px 15px;
    outline:none;
}
.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color: #ffffff;
    font-weight: 600;
}

.search-box{
    width:180px;
}

.search-box input{
    border:none;
    background:#f3f3f3;
    border-radius:30px;
    padding:8px 15px;
    width:100%;
    outline:none;
}

.content-area{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:30px;
    border:1px solid rgba(255,255,255,.2);
    padding:40px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.logo-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:35px;
}

.login-card h3{
    text-align:center;
    margin:20px 0 30px;
    font-weight:700;
}

.login-card label{
    margin-bottom:8px;
    font-weight:500;
}

.form-control{
    height:50px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,.25);
    color:white;
}

.form-control::placeholder{
    color:rgba(255,255,255,.7);
}

.form-control:focus{
    background:rgba(255,255,255,.3);
    color:white;
    box-shadow:none;
}

.btn-login{
    width:100%;
    height:50px;
    border:none;
    border-radius:30px;
    background:#2f80ed;
    color:white;
    font-weight:600;
    margin-top:20px;
    transition:.3s;
}

.btn-login:hover{
    background:#1565d8;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:600;
}

</style>
</head>

<body>

<div class="main-wrapper">

    <div class="top-nav">

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About us</a>
            <a href="#">Contact us</a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search">
        </div>

    </div>

    <div class="container content-area">

        <div class="login-card">

            <div class="logo-icon">
                <i class="fa-solid fa-bolt"></i>
            </div>

            <h3>Electricity Bill Calculator</h3>

            <div class="mb-3">
                <label>Customer Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter Name">
            </div>

            <div class="mb-3">
                <label>Previous Meter Reading</label>
                <input type="number" class="form-control" id="previous" placeholder="Previous Reading">
            </div>

            <div class="mb-3">
                <label>Current Meter Reading</label>
                <input type="number" class="form-control" id="current" placeholder="Current Reading">
            </div>

            <div class="mb-3">
                <label>Price Per Unit</label>
                <input type="number" class="form-control" id="price" placeholder="Price">
            </div>

            <button class="btn-login"  onclick="window.location.href='History.html'">
                Calculate Bill
            </button>

            <div id="result"></div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
