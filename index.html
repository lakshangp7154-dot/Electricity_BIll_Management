<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electrecity Website</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- ccs -->
   <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins',sans-serif;
    }
    body{
        min-height:100vh;
        background:url('https://jhatpatportal.uppcl.org/jhatpat/assets/Homepage%20images/1.jpg') center center/cover no-repeat;
        position:relative;
        overflow-x:hidden;
    }

    body::before{
        content:'';
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.55);
        backdrop-filter:blur(2px);
    }

    .main-wrapper{
        position: absolute;
        z-index:10;
        min-height:100vh;
    }

    /* TOP NAVIGATION */


.top-nav{
    width:750px;
    max-width:100%;
    /* margin:25px auto; */
    margin-left: 865px;
    margin-bottom: 38px;
    margin-top: 25px;
    background: rgb(255 255 255 / 20%);
    border-radius: 15px;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.nav-links{
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color: #ffffff;
    font-weight: 600;
}

.search-box{
    width:180px;
}

.search-box input{
    border:none;
    background:#f3f3f3;
    border-radius:30px;
    padding:8px 15px;
    width:100%;
    outline:none;
}

   /* CONTENT */

.content-area{
    min-height:80vh;
    display:flex;
    align-items:center;
    margin-left: 333px;
}

.title-card{
    background:#fff;
    border-radius:40px;
    margin-left: -370px;
    padding:60px;
    max-width:600px;
    box-shadow:0 20px 40px rgba(0,0,0,.20);
}

.title-card h1{
    font-size: 40px;
    font-weight: 200;
    line-height:1;
    margin-bottom:10px;
}

.title-card h2{
    font-size:65px;
    font-weight:300;
    line-height:1;
}

.title-card h3{
    font-size:70px;
    font-weight:700;
    color:#2f80ed;
}


   /* LOGIN CARD */


.login-card{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:35px;
    padding:40px;
    color:#fff;
    box-shadow:0 20px 40px rgba(0,0,0,.30);
}

.login-card h3{
    text-align:center;
    font-weight:700;
    margin-bottom:30px;
    letter-spacing:1px;
}

.login-card label{
    margin-bottom:8px;
    font-weight:500;
}

.login-card .form-control{
    height:55px;
    border:none;
    border-radius:50px;
    background:rgba(255,255,255,.25);
    color:#fff;
    padding-left:20px;
}

.login-card .form-control::placeholder{
    color:rgba(255,255,255,.7);
}

.login-card .form-control:focus{
    background:rgba(255,255,255,.30);
    color:#fff;
    box-shadow:none;
}

.btn-login{
    width:100%;
    height:55px;
    border:none;
    border-radius:50px;
    background:#2f80ed;
    color:#fff;
    font-weight:600;
    margin-top:10px;
    transition:.3s;
}

.btn-login:hover{
    background:#1565d8;
}

.logo-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(255,255,255,.20);
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px;
    font-size:35px;
}
   </style>
</head>

<body>

    <!-- outer backgroud -->
    <div class="main-wrapper">
        <div class="top-nav">

            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">About us</a>
                <a href="#">Contact us</a>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Search">
            </div>

        </div>

        <!-- CONTENT -->
        <div class="container content-area">

            <div class="row align-items-center w-100">

                <!-- LEFT SIDE -->
                <div class="col-lg-7">

                    <div class="title-card">

                        <h1>ELECTRICITY BILL</h1>

                        <h2>Management</h2>

                        <h3>System</h3>

                    </div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="col-lg-5">

                    <div class="login-card">

                        <div class="logo-icon">
                            <i class="fa-solid fa-bolt"></i>
                        </div>

                        <h3>ADMIN LOGIN</h3>

                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" class="form-control" placeholder="Enter Username">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Enter Password">
                        </div>

                        <div class="mb-4">
                            <label>NIC</label>
                            <input type="text" class="form-control" placeholder="Enter NIC">
                        </div>

                        <button class="btn-login" onclick="window.location.href='calculation.html'">
                            LOGIN
                        </button>

                    </div>

                </div>

            </div>

        </div>
    </div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
